name: Deploy Backend MIRÓ Develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install VPN and SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openconnect \
            vpnc-scripts \
            sshpass \
            iputils-ping \
            netcat-openbsd \
            traceroute

      - name: Fix vpnc-script path
        run: |
          VPNC_SCRIPT=$(find /usr -name "vpnc-script" 2>/dev/null | head -1)
          if [ -z "$VPNC_SCRIPT" ]; then
            echo "vpnc-script no encontrado en /usr, buscando en todo el sistema..."
            VPNC_SCRIPT=$(find / -name "vpnc-script" 2>/dev/null | head -1)
          fi
          if [ -n "$VPNC_SCRIPT" ]; then
            echo "vpnc-script encontrado en: $VPNC_SCRIPT"
            sudo mkdir -p /etc/vpnc
            sudo cp "$VPNC_SCRIPT" /etc/vpnc/vpnc-script
            sudo chmod +x /etc/vpnc/vpnc-script
          else
            echo "ERROR: vpnc-script no encontrado"
            exit 1
          fi

      - name: Bring down Docker network to avoid VPN conflict
        run: |
          echo "=== Bajando docker0 para evitar conflicto con red VPN 172.17.x.x ==="
          sudo ip link set docker0 down 2>/dev/null || echo "docker0 ya estaba inactivo"
          sudo ip route del 172.17.0.0/16 2>/dev/null || echo "Ruta 172.17.0.0/16 ya no existía"
          echo "Rutas actuales:"
          ip route

      - name: Connect to VPN
        run: |
          echo "${{ secrets.VPN_PASSWORD }}" | sudo openconnect \
            --protocol=gp \
            --user="${{ secrets.VPN_USER }}" \
            --passwd-on-stdin \
            --servercert pin-sha256:+4XOhCB4GmaXr8/TMWL09EayWRbrz3X8WWAWgu79f9U= \
            --script /etc/vpnc/vpnc-script \
            "${{ secrets.VPN_HOST }}" \
            -b

      - name: Wait for VPN route to internal host
        run: |
          for i in {1..30}; do
            ROUTE=$(ip route get "${{ secrets.INTERNAL_RESOURCE_IP }}" 2>/dev/null)
            if echo "$ROUTE" | grep -q "tun0"; then
              echo "Ruta al host detectada por tun0 en intento $i — VPN lista"
              echo "$ROUTE"
              exit 0
            fi
            echo "Intento $i/30: esperando ruta VPN por tun0..."
            sleep 3
          done
          echo "ERROR: tun0 nunca enrutó al host después de 90s"
          ip route
          exit 1

      - name: Verify VPN interfaces and routes
        run: |
          echo "=== IP ADDR ==="
          ip a
          echo
          echo "=== IP ROUTE ==="
          ip route
          echo
          echo "=== ROUTE TO INTERNAL HOST ==="
          ip route get "${{ secrets.INTERNAL_RESOURCE_IP }}" || true

      - name: Test ICMP connectivity to internal host
        continue-on-error: true
        run: |
          ping -c 3 "${{ secrets.INTERNAL_RESOURCE_IP }}" || echo "Ping failed (puede estar bloqueado por firewall)"

      - name: Test TCP port 22 on internal host
        run: |
          for i in {1..20}; do
            if nc -z -w 5 "${{ secrets.INTERNAL_RESOURCE_IP }}" 22 2>/dev/null; then
              echo "Puerto 22 accesible en intento $i"
              exit 0
            fi
            echo "Intento $i/20: puerto 22 no disponible, reintentando en 3s..."
            sleep 3
          done
          echo "ERROR: Puerto 22 no accesible después de 60s"
          exit 1

      - name: Test SSH connectivity
        run: |
          sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=5 \
            "${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }}" \
            'echo "SSH connection successful"'

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Update repository on remote server
        run: |
          sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=5 \
            "${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }}" << 'EOF'
            set -e
            cd ~/MIRO_TEST/Back_Miro_Test
            git fetch origin develop
            git reset --hard origin/develop
            npm install
          EOF

      - name: Restart PM2 for development
        run: |
          sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=5 \
            "${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }}" << 'EOF'
            set -e
            cd ~/MIRO_TEST/Back_Miro_Test
            pm2 restart Back_Dev
          EOF

      - name: Deployment complete
        run: echo "Development deployment complete"